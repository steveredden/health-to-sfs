services:
  garmin-health-to-sfs:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: garmin-health-to-sfs
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GARMIN_EMAIL: ${GARMIN_EMAIL}
      GARMIN_PASSWORD: ${GARMIN_PASSWORD}
    volumes:
      # Mount the SAME config directory that statistics-for-strava uses.
      # The script edits config.yaml directly.
      - ../config:/config
