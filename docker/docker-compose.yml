services:
  health-to-sfs:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - CONTAINER_PORT=${APP_PORT}
    container_name: health-to-sfs
    restart: unless-stopped
    networks:
      - frontend
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      API_SECRET: ${API_SECRET}
      CONFIG_PATH: "/config/config.yaml"
    volumes:
      - ../config:/config

networks:
  frontend:
    external: true
